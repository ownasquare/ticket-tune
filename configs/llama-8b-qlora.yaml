project_name: tickettune-llama-8b-qlora
seed: 42
model:
  name_or_path: meta-llama/Llama-3.1-8B-Instruct
  revision: 0e9e39f249a16976918f6564b8830bc894c89659
  parameters_b: 8.0
  torch_dtype: bfloat16
  trust_remote_code: false
  max_sequence_length: 2048
  eos_token: <|eot_id|>
data:
  source_path: data/raw/support_tickets.jsonl
  processed_dir: data/processed/llama-8b
  splits:
    train: 0.75
    validation: 0.125
    test: 0.125
lora:
  method: qlora
  r: 32
  alpha: 64
  dropout: 0.05
  bias: none
  target_modules: all-linear
  use_rslora: true
training:
  output_dir: artifacts/llama-8b
  num_train_epochs: 3.0
  max_steps: null
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0002
  warmup_steps: 1
  weight_decay: 0.0
  logging_steps: 5
  save_steps: 25
  eval_steps: 25
  gradient_checkpointing: true
  bf16: true
  fp16: false
  packing: false
  completion_only_loss: true
  optim: paged_adamw_8bit
  report_to: []
  use_cpu: false
generation:
  max_new_tokens: 256
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  repetition_penalty: 1.0
evaluation:
  output_dir: artifacts/llama-8b/evaluation
  thresholds:
    strict_json_rate: 0.97
    schema_valid_rate: 0.97
    category_accuracy: 0.9
    priority_accuracy: 0.9
    sentiment_accuracy: 0.85
    response_policy_rate: 0.97
deployment:
  merged_model_dir: artifacts/llama-8b/merged
  ollama_model_name: llama-tickettune-8b
  ollama_quantization: Q4_K_M
  vllm_served_model_name: llama-tickettune-8b
  vllm_host: 127.0.0.1
  vllm_port: 8000
  vllm_dtype: bfloat16
  max_model_len: 2048
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.9
