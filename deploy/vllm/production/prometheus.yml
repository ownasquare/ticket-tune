global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: tickettune

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - scheme: http
      static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: tickettune-vllm
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - gateway:9091

  - job_name: tickettune-prometheus
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: tickettune-alertmanager
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - alertmanager:9093
