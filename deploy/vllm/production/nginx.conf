worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;
    limit_req_zone $binary_remote_addr zone=tickettune_api:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=tickettune_connections:10m;

    log_format tickettune_redacted escape=json '{"request_id":"$request_id","method":"$request_method","uri":"$uri","status":$status,"request_time":$request_time,"upstream_time":"$upstream_response_time"}';
    access_log /dev/stdout tickettune_redacted;
    error_log /dev/stderr warn;

    upstream tickettune_vllm {
        server vllm:8000;
        keepalive 16;
    }

    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate /run/secrets/tls_certificate;
        ssl_certificate_key /run/secrets/tls_private_key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:TLS:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        client_max_body_size 64k;
        client_body_timeout 10s;
        client_header_timeout 10s;
        keepalive_timeout 30s;
        send_timeout 75s;

        add_header X-Request-ID $request_id always;
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control "no-store" always;

        location = /v1/models {
            limit_except GET {
                deny all;
            }
            limit_req zone=tickettune_api burst=4 nodelay;
            limit_conn tickettune_connections 8;
            proxy_pass http://tickettune_vllm;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
            proxy_send_timeout 15s;
            proxy_hide_header Server;
        }

        location = /v1/chat/completions {
            limit_except POST {
                deny all;
            }
            limit_req zone=tickettune_api burst=4 nodelay;
            limit_conn tickettune_connections 8;
            proxy_pass http://tickettune_vllm;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 75s;
            proxy_send_timeout 15s;
            proxy_buffering off;
            proxy_hide_header Server;
        }

        location / {
            return 404;
        }
    }

    server {
        listen 9091;
        server_name _;

        access_log off;

        location = /metrics {
            proxy_pass http://tickettune_vllm;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Authorization "";
            proxy_set_header Host vllm;
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
            proxy_send_timeout 15s;
            proxy_hide_header Server;
        }

        location / {
            return 404;
        }
    }
}
