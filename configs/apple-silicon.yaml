project_name: tickettune-apple-silicon
seed: 42
model:
  name_or_path: Qwen/Qwen2.5-1.5B-Instruct
  revision: 989aa7980e4cf806f80c7fef2b1adb7bc71aa306
  parameters_b: 1.5
  torch_dtype: float16
  trust_remote_code: false
  max_sequence_length: 2048
  eos_token: <|im_end|>
data:
  source_path: data/raw/support_tickets.jsonl
  processed_dir: data/processed/apple-silicon
  splits:
    train: 0.75
    validation: 0.125
    test: 0.125
lora:
  method: lora
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  target_modules: all-linear
  use_rslora: true
training:
  output_dir: artifacts/apple-silicon
  num_train_epochs: 3.0
  max_steps: null
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  warmup_steps: 1
  weight_decay: 0.0
  logging_steps: 5
  save_steps: 25
  eval_steps: 25
  gradient_checkpointing: true
  bf16: false
  fp16: true
  packing: false
  completion_only_loss: true
  optim: adamw_torch
  report_to: []
  use_cpu: false
generation:
  max_new_tokens: 256
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  repetition_penalty: 1.0
evaluation:
  output_dir: artifacts/apple-silicon/evaluation
  thresholds:
    strict_json_rate: 0.95
    schema_valid_rate: 0.95
    category_accuracy: 0.85
    priority_accuracy: 0.85
    sentiment_accuracy: 0.8
    response_policy_rate: 0.95
deployment:
  merged_model_dir: artifacts/apple-silicon/merged
  ollama_model_name: tickettune-apple
  ollama_quantization: Q4_K_M
  vllm_served_model_name: tickettune-apple
  vllm_host: 127.0.0.1
  vllm_port: 8000
  vllm_dtype: half
  max_model_len: 2048
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.9
